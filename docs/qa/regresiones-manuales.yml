    sintoma: "La UI de DataTables muestra la flecha de orden cambiando (asc/desc) pero las filas devueltas por el servidor no cambian de orden: ContactosController.GetData siempre hace '.OrderByDescending(c => c.FechaUltimaActividad)' e IndustriasController.GetData siempre hace '.OrderBy(i => i.Orden)', sin leer Request.Form[\"order[0][column]\"]/Request.Form[\"order[0][dir]\"] que el DataTable si envia (a diferencia de AuditController.GetData, que si implementa GetSortColumn() + SortColumn/SortDirection)."
