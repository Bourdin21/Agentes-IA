# Catalogo de regresiones reproducidas manualmente.
# Cada item describe parametros suficientes para que un agente QA:
#   1. Reproduzca el bug en una build candidata.
#   2. Detecte automaticamente si reaparecio.
#   3. Aplique (o sugiera) el fix conocido.
#
# Formato:
#   id:           identificador estable (no renombrar).
#   modulo:       area funcional / ruta principal.
#   titulo:       resumen humano.
#   severidad:    blocker | critical | major | minor.
#   reproducido_en: rama o commit donde se reprodujo.
#   pasos:        lista de acciones manuales para reproducir.
#   sintoma:      lo que el usuario observa cuando el bug existe.
#   expectativa:  comportamiento correcto esperado.
#   causa_raiz:   descripcion tecnica.
#   capa:         Domain | Application | Infrastructure | Web.
#   archivos_fix: rutas tocadas en la solucion + breve motivo.
#   migracion_ef: nombre de migracion si aplica, o null.
#   deteccion_qa:
#     tipo: ui | api | data | static.
#     selector_o_endpoint: pista para automatizar.
#     condicion_falla:    como decidir que el bug existe.
#   criterio_aceptacion:  bullets verificables.
#   pruebas_minimas:      lista de pruebas funcionales que el agente QA debe correr.

version: 1
proyecto: ShowroomGriffin
ultima_actualizacion: 2026-04-29

regresiones:

  - id: REG-001
    modulo: Variantes / Stock
    titulo: "DbUpdateException al crear variante por RowVersion en MySQL"
    severidad: blocker
    reproducido_en: main
    pasos:
      - "Ir a Productos -> Detalle -> Crear Variante."
      - "Completar campos minimos y guardar."
    sintoma: "Microsoft.EntityFrameworkCore.DbUpdateException: Field 'RowVersion' doesn't have a default value."
    expectativa: "La variante se crea y persiste correctamente."
    causa_raiz: "MySQL no soporta rowversion store-generated como SQL Server."
    capa: Infrastructure
    archivos_fix:
      - path: ShowroomGriffin.Infrastructure/Data/AppDbContext.cs
        motivo: "Asignar RowVersion manualmente en SaveChanges/SaveChangesAsync."
      - path: ShowroomGriffin.Infrastructure/Data/Configurations/Productos/VarianteProductoConfiguration.cs
        motivo: "IsConcurrencyToken().ValueGeneratedNever().IsRequired()."
    migracion_ef: "RowVersionVarianteManual"
    deteccion_qa:
      tipo: api
      selector_o_endpoint: "POST /Variantes/Crear/{productoId}"
      condicion_falla: "respuesta 500 o ModelState con DbUpdateException sobre RowVersion."
    criterio_aceptacion:
      - "Crear variante NO lanza DbUpdateException."
      - "VarianteProducto.RowVersion se persiste no nulo y unico por save."
    pruebas_minimas:
      - "Crear variante simple."
      - "Editar variante (verificar concurrencia funcional)."

  - id: REG-002
    modulo: Variantes / Stock
    titulo: "No se podia cargar stock inicial al crear/editar variante"
    severidad: major
    reproducido_en: main
    pasos:
      - "Productos -> Detalle -> Crear Variante."
      - "Buscar campo de stock inicial."
    sintoma: "No existe input para cargar stock al crear la variante; obliga a usar otra pantalla."
    expectativa: "Al crear o editar la variante, el usuario puede ingresar stock inicial y queda registrado en VarianteStock."
    causa_raiz: "El VM y el service no exponian StockInicial."
    capa: Application + Infrastructure + Web
    archivos_fix:
      - path: ShowroomGriffin.Application/DTOs/Productos/VarianteViewModel.cs
        motivo: "Agregar StockInicial."
      - path: ShowroomGriffin.Infrastructure/Services/VarianteService.cs
        motivo: "Crear/actualizar VarianteStock con el valor inicial."
      - path: ShowroomGriffin.Web/Views/Variantes/Crear.cshtml
        motivo: "Input de stock inicial."
      - path: ShowroomGriffin.Web/Views/Variantes/Editar.cshtml
        motivo: "Input editable + carga de stock actual."
    migracion_ef: null
    deteccion_qa:
      tipo: ui
      selector_o_endpoint: "input[name='StockInicial'] en /Variantes/Crear/* y /Variantes/Editar/*"
      condicion_falla: "el input no existe o el valor enviado no actualiza VarianteStock.Cantidad."
    criterio_aceptacion:
      - "Al crear variante con StockInicial=N, VarianteStock.Cantidad == N."
      - "Al editar variante con cambio de stock, queda registrado y auditable."
    pruebas_minimas:
      - "Crear variante con StockInicial=5 y verificar grilla de stock."
      - "Editar variante y modificar stock."

