  - id: REG-008
    modulo: Ventas / Crear (pagos)
    titulo: "Input de importe pierde foco al tipear"
    severidad: major
    reproducido_en: main
    pasos:
      - "Ventas -> Crear, agregar pago, tipear en Importe."
    sintoma: "Tras cada caracter el cursor se sale del input."
    expectativa: "Tipear el numero completo sin perder foco; recalc onchange/input."
    causa_raiz: "renderPagos() rehacia el tbody en cada keystroke, destruyendo el input enfocado."
    capa: Web
    archivos_fix:
      - path: ShowroomGriffin.Web/Views/Ventas/Crear.cshtml
        motivo: "actualizarTotalFilaPago(idx) sin re-render; recalc preserva foco."
    migracion_ef: null
    deteccion_qa:
      tipo: ui
      selector_o_endpoint: ".inp-importe en /Ventas/Crear"
      condicion_falla: "document.activeElement deja de ser el input tras cada keystroke."
    criterio_aceptacion:
      - "Tipear '12345.67' completo en un solo focus."
      - "Total c/Financ y Diferencia se actualizan en vivo."
    pruebas_minimas:
      - "Tipear importe largo sin perder foco."
      - "Cambiar % financiamiento sin perder foco."

  - id: REG-009
    modulo: AumentoMasivo
    titulo: "Cascada Categoria -> Subgrupo no carga subgrupos"
    severidad: major
    reproducido_en: main
    pasos:
      - "AumentoMasivo -> Alcance 'Por subgrupo' -> elegir Categoria 'Ropa'."
    sintoma: "Subgrupo queda vacio."
    expectativa: "Al elegir categoria, subgrupos se autopueblan."
    causa_raiz: "Vista llamaba /Subgrupos/PorCategoria/{id} (segmento posicional) y la accion declara categoriaId, ligando 0."
    capa: Web
    archivos_fix:
      - path: ShowroomGriffin.Web/Views/AumentoMasivo/Index.cshtml
        motivo: "Querystring ?categoriaId=, dataType:'json', placeholders y allowClear."
      - path: ShowroomGriffin.Web/Controllers/SubgruposController.cs
        motivo: "PorCategoria(int categoriaId, int id=0) tolerante."
    migracion_ef: null
    deteccion_qa:
      tipo: api
      selector_o_endpoint: "GET /Subgrupos/PorCategoria?categoriaId={cat}"
      condicion_falla: "Endpoint con parametro segmento devuelve 0 resultados."
    criterio_aceptacion:
      - "GET /Subgrupos/PorCategoria?categoriaId=X devuelve subgrupos correctos."
      - "Combo subgrupo se popula al cambiar categoria."
    pruebas_minimas:
      - "Cascada Ropa -> subgrupos visibles."

  - id: REG-010
