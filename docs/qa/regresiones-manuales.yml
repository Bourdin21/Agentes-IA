# Catalogo de regresiones reproducidas manualmente.
# Cada item describe parametros suficientes para que un agente QA:
#   1. Reproduzca el bug en una build candidata.
#   2. Detecte automaticamente si reaparecio.
#   3. Aplique (o sugiera) el fix conocido.
#
# Formato:
#   id:           identificador estable (no renombrar).
#   modulo:       area funcional / ruta principal.
#   titulo:       resumen humano.
#   severidad:    blocker | critical | major | minor.
#   reproducido_en: rama o commit donde se reprodujo.
#   pasos:        lista de acciones manuales para reproducir.
#   sintoma:      lo que el usuario observa cuando el bug existe.
#   expectativa:  comportamiento correcto esperado.
#   causa_raiz:   descripcion tecnica.
#   capa:         Domain | Application | Infrastructure | Web.
#   archivos_fix: rutas tocadas en la solucion + breve motivo.
#   migracion_ef: nombre de migracion si aplica, o null.
#   deteccion_qa:
#     tipo: ui | api | data | static.
#     selector_o_endpoint: pista para automatizar.
#     condicion_falla:    como decidir que el bug existe.
#   criterio_aceptacion:  bullets verificables.
#   pruebas_minimas:      lista de pruebas funcionales que el agente QA debe correr.

version: 1
proyecto: ShowroomGriffin
ultima_actualizacion: 2026-04-29

regresiones:

  - id: REG-001
    modulo: Variantes / Stock
    titulo: "DbUpdateException al crear variante por RowVersion en MySQL"
    severidad: blocker
    reproducido_en: main
    pasos:
      - "Ir a Productos -> Detalle -> Crear Variante."
      - "Completar campos minimos y guardar."
    sintoma: "Microsoft.EntityFrameworkCore.DbUpdateException: Field 'RowVersion' doesn't have a default value."
    expectativa: "La variante se crea y persiste correctamente."
    causa_raiz: "MySQL no soporta rowversion store-generated como SQL Server."
    capa: Infrastructure
    archivos_fix:
      - path: ShowroomGriffin.Infrastructure/Data/AppDbContext.cs
        motivo: "Asignar RowVersion manualmente en SaveChanges/SaveChangesAsync."
      - path: ShowroomGriffin.Infrastructure/Data/Configurations/Productos/VarianteProductoConfiguration.cs
        motivo: "IsConcurrencyToken().ValueGeneratedNever().IsRequired()."
    migracion_ef: "RowVersionVarianteManual"
    deteccion_qa:
      tipo: api
      selector_o_endpoint: "POST /Variantes/Crear/{productoId}"
      condicion_falla: "respuesta 500 o ModelState con DbUpdateException sobre RowVersion."
    criterio_aceptacion:
      - "Crear variante NO lanza DbUpdateException."
      - "VarianteProducto.RowVersion se persiste no nulo y unico por save."
    pruebas_minimas:
      - "Crear variante simple."
      - "Editar variante (verificar concurrencia funcional)."

  - id: REG-002
    modulo: Variantes / Stock
    titulo: "No se podia cargar stock inicial al crear/editar variante"
    severidad: major
    reproducido_en: main
    pasos:
      - "Productos -> Detalle -> Crear Variante."
      - "Buscar campo de stock inicial."
    sintoma: "No existe input para cargar stock al crear la variante; obliga a usar otra pantalla."
    expectativa: "Al crear o editar la variante, el usuario puede ingresar stock inicial y queda registrado en VarianteStock."
    causa_raiz: "El VM y el service no exponian StockInicial."
    capa: Application + Infrastructure + Web
    archivos_fix:
      - path: ShowroomGriffin.Application/DTOs/Productos/VarianteViewModel.cs
        motivo: "Agregar StockInicial."
      - path: ShowroomGriffin.Infrastructure/Services/VarianteService.cs
        motivo: "Crear/actualizar VarianteStock con el valor inicial."
      - path: ShowroomGriffin.Web/Views/Variantes/Crear.cshtml
        motivo: "Input de stock inicial."
      - path: ShowroomGriffin.Web/Views/Variantes/Editar.cshtml
        motivo: "Input editable + carga de stock actual."
    migracion_ef: null
    deteccion_qa:
      tipo: ui
      selector_o_endpoint: "input[name='StockInicial'] en /Variantes/Crear/* y /Variantes/Editar/*"
      condicion_falla: "el input no existe o el valor enviado no actualiza VarianteStock.Cantidad."
    criterio_aceptacion:
      - "Al crear variante con StockInicial=N, VarianteStock.Cantidad == N."
      - "Al editar variante con cambio de stock, queda registrado y auditable."
    pruebas_minimas:
      - "Crear variante con StockInicial=5 y verificar grilla de stock."
      - "Editar variante y modificar stock."

  - id: REG-003
    modulo: Compras / Crear
    titulo: "Autocomplete (proveedor / variantes) no devuelve resultados"
    severidad: major
    reproducido_en: main
    pasos:
      - "Compras -> Crear."
      - "Tipear en el combo Proveedor o Variantes."
    sintoma: "El combo no muestra resultados aunque hay datos cargados."
    expectativa: "Cada combo Select2 devuelve resultados legibles segun el termino escrito."
    causa_raiz: "Endpoints faltantes y processResults mapeando campos inexistentes (v.descripcion)."
    capa: Web
    archivos_fix:
      - path: ShowroomGriffin.Web/Views/Compras/Crear.cshtml
        motivo: "Select2 con dataType:'json' y mapping a campos reales."
      - path: ShowroomGriffin.Web/Controllers/ProveedoresController.cs
        motivo: "Endpoint Buscar para autocomplete."
    migracion_ef: null
    deteccion_qa:
      tipo: ui
      selector_o_endpoint: "Select2 #selProveedor y #selVariante en /Compras/Crear"
      condicion_falla: "Select2 no devuelve resultados o textos vacios al tipear 'a'."
    criterio_aceptacion:
      - "Al tipear letra en proveedor: devuelve >= 1 resultado con nombre y telefono visible."
      - "Al tipear letra en variante: devuelve resultados con producto/talle/color."
    pruebas_minimas:
      - "Smoke autocomplete proveedor y variante."

  - id: REG-004
    modulo: Compras / Detalle
    titulo: "Maquina de estados de Compra no respetaba el flujo funcional"
    severidad: major
    reproducido_en: main
    pasos:
      - "Crear compra Borrador, intentar avanzar."
    sintoma: "Botones permitian saltar estados o exponian acciones invalidas."
    expectativa: "Borrador -> EnProceso -> Verificada -> Recibida con botones acordes."
    causa_raiz: "UI desalineada con CambiarEstadoAsync; Recepcionar no validaba estado actual."
    capa: Web + Infrastructure
    archivos_fix:
      - path: ShowroomGriffin.Web/Views/Compras/Detalle.cshtml
        motivo: "Mapa de badges y handler .btn-avanzar segun estado."
      - path: ShowroomGriffin.Web/Controllers/ComprasController.cs
        motivo: "Recepcionar(int id) con guard de estado."
    migracion_ef: null
    deteccion_qa:
      tipo: ui
      selector_o_endpoint: "/Compras/Detalle/{id} boton avanzar y /Compras/Recepcionar/{id}"
      condicion_falla: "Aparecen botones para estados no validos o GET Recepcionar acepta cualquier estado."
    criterio_aceptacion:
      - "Borrador muestra 'Confirmar pedido' y no 'Recepcionar'."
      - "EnProceso muestra 'Verificar remito'."
      - "Verificada muestra 'Recepcionar'."
      - "Recibida no muestra acciones de avance."
    pruebas_minimas:
      - "Recorrido completo Borrador -> Recibida."
      - "Intento de saltar estados falla controladamente."

  - id: REG-005
    modulo: Ventas / Crear
    titulo: "Autocomplete de variantes muestra resultados sin texto"
    severidad: major
    reproducido_en: main
    pasos:
      - "Ventas -> Crear -> tipear en buscador de variante."
    sintoma: "Resultados blancos o lista vacia."
    expectativa: "Resultados con texto Producto - Talle - Color - Modelo - SKU."
    causa_raiz: "processResults usaba v.descripcion (no existe en API)."
    capa: Web
    archivos_fix:
      - path: ShowroomGriffin.Web/Views/Ventas/Crear.cshtml
        motivo: "Select2 con campos reales y dataType:'json'."
    migracion_ef: null
    deteccion_qa:
      tipo: ui
      selector_o_endpoint: "Select2 #selVariante en /Ventas/Crear"
      condicion_falla: "Resultados sin texto al tipear letra."
    criterio_aceptacion:
      - "Cada item del dropdown contiene al menos productoNombre o sku."
    pruebas_minimas:
      - "Smoke autocomplete variante en venta."

  - id: REG-006
    modulo: Ventas / Crear
    titulo: "Medio de pago Cuotas no pedia cantidad ni % financiamiento"
    severidad: major
    reproducido_en: main
    pasos:
      - "Ventas -> Crear, agregar pago, elegir Cuotas."
    sintoma: "No solicitaba cantidad de cuotas (>=2) ni porcentaje de financiamiento."
    expectativa: "Cuotas requiere CantidadCuotas (>=2) y PorcentajeFinanciamiento (>=0)."
    causa_raiz: "Faltaba CantidadCuotas en domain/DTO/UI; sin validacion server-side."
    capa: Domain + Application + Infrastructure + Web
    archivos_fix:
      - path: ShowroomGriffin.Domain/Entities/Ventas/VentaPago.cs
        motivo: "Agregar CantidadCuotas (int?)."
      - path: ShowroomGriffin.Application/DTOs/Ventas/VentasViewModels.cs
        motivo: "Agregar CantidadCuotas en VentaPagoItem/LineaViewModel."
      - path: ShowroomGriffin.Infrastructure/Services/VentaService.cs
        motivo: "Validacion por medio + normalizacion (Cuotas conserva, otros limpian)."
      - path: ShowroomGriffin.Infrastructure/Data/Configurations/Ventas/VentaPagoConfiguration.cs
        motivo: "Mapping CantidadCuotas."
      - path: ShowroomGriffin.Web/Views/Ventas/Crear.cshtml
        motivo: "Inputs condicionales + payload + validacion cliente."
      - path: ShowroomGriffin.Web/Views/Ventas/Detalle.cshtml
        motivo: "Columna Cuotas en detalle."
    migracion_ef: "AddCantidadCuotasToVentaPago"
    deteccion_qa:
      tipo: ui
      selector_o_endpoint: "Select medioPago=3 en /Ventas/Crear"
      condicion_falla: "Inputs cuotas/% financiamiento no aparecen, o backend acepta CantidadCuotas<2 sin error."
    criterio_aceptacion:
      - "Medio Cuotas con CantidadCuotas<2 -> error 400 con mensaje claro."
      - "Medio Cuotas sin PorcentajeFinanciamiento -> error 400."
      - "Medio Cuotas valido se guarda y aparece en Detalle."
    pruebas_minimas:
      - "Pago Cuotas valido."
      - "Pago Cuotas con cuotas=1 (debe fallar)."
      - "Pago Cuotas sin %financ (debe fallar)."

  - id: REG-007
    modulo: Devoluciones / Crear
    titulo: "Autocomplete 'Nueva variante' no carga en cambios"
