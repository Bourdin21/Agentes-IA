        motivo: "TransicionesValidasCompra[Borrador] ahora incluye tambien Cancelada ademas de Generada. Sin cambios en CambiarEstadoAsync (la rama Cancelada ya soportaba el caso sin Factura posteada) ni en la vista (el mensaje de confirmacion ya diferenciaba correctamente segun si habia Factura que revertir)."
    migracion_ef: null
    deteccion_qa:
      tipo: api
      selector_o_endpoint: "POST /Compras/CambiarEstado con compraId de una compra en Borrador y nuevoEstado=Cancelada (5)"
      condicion_falla: "La respuesta devuelve ServiceResult.Success=false con el mensaje \"No se puede pasar de 'Borrador' a 'Cancelada'.\""
    criterio_aceptacion:
      - "Cancelar una CompraProveedor en Borrador tiene exito: pasa a Cancelada, todos sus items vuelven a estar disponibles en Compras/Crear (CompraProveedorId = null), y no se postea ni revierte ningun movimiento Factura (no existia)."
      - "El boton 'Cancelar' aparece en Compras/Detalle para una compra en Borrador (via TransicionesPermitidas)."
      - "Las transiciones ya existentes (Generada/EnPreparacion -> Cancelada, con reversion de Factura) no regresionan."
    pruebas_minimas:
