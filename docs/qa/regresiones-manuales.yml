  - id: REG-006
    modulo: Ventas / Crear
    titulo: "Medio de pago Cuotas no pedia cantidad ni % financiamiento"
    severidad: major
    reproducido_en: main
    pasos:
      - "Ventas -> Crear, agregar pago, elegir Cuotas."
    sintoma: "No solicitaba cantidad de cuotas (>=2) ni porcentaje de financiamiento."
    expectativa: "Cuotas requiere CantidadCuotas (>=2) y PorcentajeFinanciamiento (>=0)."
    causa_raiz: "Faltaba CantidadCuotas en domain/DTO/UI; sin validacion server-side."
    capa: Domain + Application + Infrastructure + Web
    archivos_fix:
      - path: ShowroomGriffin.Domain/Entities/Ventas/VentaPago.cs
        motivo: "Agregar CantidadCuotas (int?)."
      - path: ShowroomGriffin.Application/DTOs/Ventas/VentasViewModels.cs
        motivo: "Agregar CantidadCuotas en VentaPagoItem/LineaViewModel."
      - path: ShowroomGriffin.Infrastructure/Services/VentaService.cs
        motivo: "Validacion por medio + normalizacion (Cuotas conserva, otros limpian)."
      - path: ShowroomGriffin.Infrastructure/Data/Configurations/Ventas/VentaPagoConfiguration.cs
        motivo: "Mapping CantidadCuotas."
      - path: ShowroomGriffin.Web/Views/Ventas/Crear.cshtml
        motivo: "Inputs condicionales + payload + validacion cliente."
      - path: ShowroomGriffin.Web/Views/Ventas/Detalle.cshtml
        motivo: "Columna Cuotas en detalle."
    migracion_ef: "AddCantidadCuotasToVentaPago"
    deteccion_qa:
      tipo: ui
      selector_o_endpoint: "Select medioPago=3 en /Ventas/Crear"
      condicion_falla: "Inputs cuotas/% financiamiento no aparecen, o backend acepta CantidadCuotas<2 sin error."
    criterio_aceptacion:
      - "Medio Cuotas con CantidadCuotas<2 -> error 400 con mensaje claro."
      - "Medio Cuotas sin PorcentajeFinanciamiento -> error 400."
      - "Medio Cuotas valido se guarda y aparece en Detalle."
    pruebas_minimas:
      - "Pago Cuotas valido."
      - "Pago Cuotas con cuotas=1 (debe fallar)."
      - "Pago Cuotas sin %financ (debe fallar)."

