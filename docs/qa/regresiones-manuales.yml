  - id: CRM-004
    modulo: "Bot / Outbound (BotController.BuscarProspectos — CU-11/HU-08)"
    titulo: "La busqueda manual de prospectos por Google Maps no maneja DbUpdateException por telefono duplicado dentro del mismo batch, a diferencia de OutboundSchedulerService que si lo hace: un duplicado entre resultados de distintas queries del mismo rubro puede tirar abajo toda la carga"
    severidad: major
    reproducido_en: "crm-olvidata - main, revision estatica de codigo (BotController.BuscarProspectos vs. OutboundSchedulerService.RunPipelineAsync), no reproducido contra la app corriendo (requiere Olvidata_GoogleMaps:ApiKey real, ver riesgo de credenciales ya senalado por el implementador)"
    pasos:
      - "Como Administrador, ir a Bot/Index -> 'Buscar prospectos por rubro' -> elegir un rubro -> Buscar."
      - "Caso en el que Google Places devuelve el mismo negocio (mismo telefono normalizado) para dos queries distintas del mismo rubro dentro de la misma corrida (ej. 'farmacia La Plata centro' y 'farmacia La Plata norte' listando el mismo local)."
    sintoma: "BotController.BuscarProspectos arma todos los Contacto nuevos en memoria dentro de un foreach (chequeando duplicado solo contra la DB con AnyAsync, no contra los que el mismo loop ya agrego sin guardar) y recien llama a un unico _db.SaveChangesAsync() al final. Si dos prospectos del mismo batch comparten Telefono, el indice unico de Contactos.Telefono hace fallar ese SaveChangesAsync con DbUpdateException sin try/catch, lo que revienta la accion completa (los demas prospectos legitimos y unicos de esa busqueda tampoco se guardan)."
    expectativa: "docs/crm-olvidata/definiciones/3-arquitecto-mvc.md §5 ('Concurrencia en alta de Contacto') ya establece el patron esperado: capturar la excepcion de duplicado y seguir (UPDATE o skip) en vez de tirar toda la operacion abajo. OutboundSchedulerService.RunPipelineAsync ya implementa exactamente ese patron (SaveChangesAsync por contacto + catch DbUpdateException + Detached). BotController.BuscarProspectos deberia seguir el mismo patron ya que ejecuta el mismo tipo de alta masiva desde el mismo servicio (IGoogleMapsService)."
    causa_raiz: "BotController.BuscarProspectos usa un unico _db.SaveChangesAsync() al final del foreach en vez de guardar incrementalmente con manejo de excepcion por fila, patron ya resuelto en OutboundSchedulerService pero no reutilizado aqui."
    capa: Web
    archivos_fix:
      - path: OlvidataCRM.Web/Controllers/BotController.cs
        motivo: "PENDIENTE DE AUTORIZACION (Implementador): mover el _db.SaveChangesAsync() dentro del foreach (por prospecto) con try/catch(DbUpdateException) que haga db.Entry(nuevoContacto).State = EntityState.Detached y continue, igual patron que OutboundSchedulerService.RunPipelineAsync."
    migracion_ef: null
    deteccion_qa:
      tipo: static
      selector_o_endpoint: "BotController.BuscarProspectos() en OlvidataCRM.Web/Controllers/BotController.cs"
      condicion_falla: "El foreach que agrega Contacto no tiene SaveChangesAsync ni try/catch por iteracion; existe un unico SaveChangesAsync() fuera del loop sin manejo de DbUpdateException."
    criterio_aceptacion:
      - "Una busqueda cuyos resultados incluyen un telefono duplicado dentro del mismo batch guarda igual todos los prospectos unicos (el duplicado se ignora, no revienta la operacion completa)."
      - "El mensaje final ('Búsqueda completada: X encontrados, Y contactos nuevos agregados') refleja correctamente Y como los realmente persistidos."
    pruebas_minimas:
      - "BLOQUEADA hasta contar con Olvidata_GoogleMaps:ApiKey real (ver riesgo de credenciales del implementador) — no ejecutable como prueba end-to-end en este ciclo de QA. Verificable por codigo/unit-level cuando se disponga de credenciales o de un doble de prueba para IGoogleMapsService."
    fix_aplicado:
      fecha: "2026-07-17"
      por: "implementador"
      resultado: "aplicado"
      archivos:
        - path: OlvidataCRM.Web/Controllers/BotController.cs
          motivo: "BuscarProspectos(): el SaveChangesAsync() unico al final del foreach se movio dentro del loop, por prospecto, envuelto en try { await _db.SaveChangesAsync(); agregados++; } catch (DbUpdateException) { _db.Entry(nuevoContacto).State = EntityState.Detached; } — mismo patron ya usado en OutboundSchedulerService.RunPipelineAsync. El mensaje final de 'agregados' sigue reflejando solo los realmente persistidos."
      build: "dotnet build OlvidataCRM.slnx -> Compilacion correcta, 0 Errores (mismos 9 warnings preexistentes, ninguno nuevo)."
      verificacion: "El fix replica un patron ya probado en codigo (OutboundSchedulerService), verificable por revision estatica. La prueba end-to-end (forzar duplicado real de telefono dentro del mismo batch de Google Maps) SIGUE BLOQUEADA hasta contar con Olvidata_GoogleMaps:ApiKey real — no se pudo cerrar ese criterio de aceptacion en este ciclo, queda para cuando haya credenciales o un doble de prueba de IGoogleMapsService."

  - id: CRM-005
    modulo: "Bot — maquina de estados FaseConversacion (AwaitingIndustry)"
    titulo: "Un rubro no reconocido en AwaitingIndustry no asigna Categoria=rent_other como especifica la tabla de Diseno; en su lugar cae a 'rent' (solo se asigna rent_other si el texto es exactamente 'Otro rubro')"
    severidad: minor
    reproducido_en: "crm-olvidata - main, revision estatica de codigo (BotFlowService.OnIndustryInputAsync), no reproducido contra WhatsApp real (bloqueado por falta de credenciales, ver riesgo del implementador)"
    pasos:
      - "Simular via POST /webhook/whatsapp una respuesta de texto libre no numerica en fase AwaitingIndustry (ej. el usuario escribe 'reparacion de bicicletas' en vez de elegir una opcion de la lista 1-8)."
    sintoma: "OnIndustryInputAsync hace 'var industry = IndustryNames.TryGetValue(text, out var name) ? name : text;' y luego 'contacto.Categoria = industry == \"Otro rubro\" ? \"rent_other\" : \"rent\";'. Como el texto libre no matchea 'Otro rubro' textualmente, Categoria queda en 'rent' (no 'rent_other'), y el bot envia las preguntas de Questions[\"rent\"] (que asumen que el rubro ya es conocido) en vez de Questions[\"rent_other\"] (que arranca preguntando '¿A que se dedica exactamente tu negocio?', mas apropiado cuando el rubro no fue identificado)."
    expectativa: "docs/crm-olvidata/definiciones/2-disenador-funcional.md §3, tabla FaseConversacion: 'AwaitingIndustry | Responde rubro (numero o texto) | AskingQuestions | — | Mapear a IndustriaCatalogo, enviar 1a pregunta | Rubro no reconocido -> Categoria=rent_other'."
    causa_raiz: "La condicion 'industry == \"Otro rubro\"' solo cubre el caso en que el usuario elige explicitamente la opcion de lista '8' (Otro rubro); no cubre el caso de texto libre arbitrario no listado, que es el escenario real que la fila de la tabla de Diseno describe."
    capa: Infrastructure
    archivos_fix:
      - path: OlvidataCRM.Infrastructure/Services/BotFlowService.cs
        motivo: "PENDIENTE DE AUTORIZACION (Implementador): en OnIndustryInputAsync, la asignacion de Categoria deberia ser 'rent_other' tanto cuando industry == \"Otro rubro\" como cuando el texto no matcheo ningun IndustryNames conocido (es decir, cuando 'name' de IndustryNames.TryGetValue fue false), no solo en el primer caso."
    migracion_ef: null
    deteccion_qa:
      tipo: static
      selector_o_endpoint: "BotFlowService.OnIndustryInputAsync() en OlvidataCRM.Infrastructure/Services/BotFlowService.cs"
      condicion_falla: "Con un 'text' que no es clave de IndustryNames y distinto de la cadena literal 'Otro rubro', Categoria resultante es 'rent' en vez de 'rent_other'."
    criterio_aceptacion:
      - "Un rubro no reconocido (texto libre no listado ni igual a 'Otro rubro') deja Categoria='rent_other' y el bot envia la primera pregunta de Questions['rent_other']."
      - "Elegir una opcion valida de la lista (1-8, incluida '8'=Otro rubro) no cambia su comportamiento actual (regresion)."
    pruebas_minimas:
      - "BLOQUEADA hasta contar con credenciales de WhatsApp reales o un entorno de prueba del webhook — no ejecutable end-to-end en este ciclo de QA. Verificable por codigo cuando el Implementador aplique el fix."

  - id: CRM-006
    modulo: "Bot — notificacion a Joaquin (CU-05/HU-05)"
    titulo: "La notificacion in-app (campanita) al calificar o pedir demo nunca se crea: BotFlowService solo envia el brief por WhatsApp (SendBriefToAdminAsync), INotificationService no esta inyectado ni se referencia en ningun punto del flujo del bot"
