  - id: CRM-001
    modulo: "Bot / Outbound (BotController.TogglePausa)"
    titulo: "Pausar/reanudar el scheduler outbound no genera ningun registro en AuditLog: el toggle es un flag estatico en memoria, sin escritura a AppDbContext, por lo que SaveChanges (unico disparador del audit trail automatico) nunca corre"
    severidad: major
    reproducido_en: "crm-olvidata - main, revision estatica de codigo tras implementacion de la migracion de BotPublicitario (2026-07-17), no reproducido contra la app corriendo (requiere DB levantada)"
    pasos:
      - "Como Administrador o SuperUsuario, ir a Bot / Outbound (/Bot/Index)."
      - "Click en 'Pausar outbound' (o 'Reanudar outbound'), confirmar el SweetAlert2."
      - "Ir a Auditoria (/Audit/Index, requiere SuperUsuario) y buscar un registro con EntityName relacionado al scheduler/outbound alrededor de ese horario."
    sintoma: "No aparece ningun registro en Audit/Index para la accion de pausar/reanudar. BotController.TogglePausa() solo hace 'OutboundSchedulerService.IsStandby = !OutboundSchedulerService.IsStandby;' (un 'static volatile bool' en memoria) y loguea por Serilog (_logger.LogInformation) — nunca toca _db ni llama a SaveChangesAsync, que es el unico lugar donde AppDbContext arma el audit trail automatico (OnBeforeSaveChanges solo se ejecuta dentro de SaveChanges/SaveChangesAsync, iterando ChangeTracker.Entries())."
    expectativa: "docs/crm-olvidata/definiciones/2-disenador-funcional.md HU-10 CA2: 'pausar/reanudar requiere confirmacion y queda registrado en auditoria (via usuario autenticado, no header compartido)'. El propio implementador lo listo como prueba minima #7 en 5-implementador.md ('pausar/reanudar... queda en AuditLog, verificar en Audit/Index como SuperUsuario')."
    causa_raiz: "IsStandby es un campo estatico sin representacion en base de datos (decision de Arquitectura, ver 3-arquitecto-mvc.md §2: 'flag Standby estatico leido/escrito desde BotController'). El unico mecanismo de auditoria automatica del sistema (AppDbContext.OnBeforeSaveChanges) solo captura cambios sobre EntityEntry del ChangeTracker durante SaveChanges; un toggle que no crea/modifica ninguna entidad nunca genera un AuditEntry, a diferencia de ContactosController.CambiarEstado (que si modifica Contacto.EstadoEmbudo, una entidad real, y por eso si audita correctamente)."
    capa: Web
    archivos_fix:
      - path: OlvidataCRM.Web/Controllers/BotController.cs
        motivo: "PENDIENTE DE AUTORIZACION (Implementador): en TogglePausa, insertar manualmente un AuditLog (UserId/UserName desde User, Action='Update', EntityName='OutboundScheduler', NewValues=JSON con el nuevo valor de IsStandby, Timestamp=DateTime.UtcNow, IpAddress desde HttpContext) y llamar a _db.SaveChangesAsync() antes del redirect. Requiere volver la accion async (hoy es 'IActionResult' sincronico)."
    migracion_ef: null
    deteccion_qa:
      tipo: static
      selector_o_endpoint: "BotController.TogglePausa() en OlvidataCRM.Web/Controllers/BotController.cs"
      condicion_falla: "El metodo no contiene ninguna llamada a _db.SaveChangesAsync()/_db.AuditLogs.Add(...), por lo que un POST a /Bot/TogglePausa nunca puede producir una fila nueva en la tabla AuditLogs."
    criterio_aceptacion:
      - "Tras confirmar 'Pausar outbound' o 'Reanudar outbound', Audit/Index (SuperUsuario) muestra un registro nuevo con UserName del usuario autenticado y el valor resultante de Standby."
      - "El toggle sigue funcionando igual (IsStandby cambia, el badge de estado en Bot/Index refleja el nuevo valor) — el fix es aditivo, no cambia el comportamiento actual del scheduler."
    pruebas_minimas:
      - "Pausar el outbound estando activo -> verificar badge 'En pausa' + nuevo registro en Audit/Index."
      - "Reanudar el outbound estando en pausa -> verificar badge 'Activo' + nuevo registro en Audit/Index."
    fix_aplicado:
      fecha: "2026-07-17"
      por: "implementador"
      resultado: "aplicado"
      archivos:
        - path: OlvidataCRM.Web/Controllers/BotController.cs
          motivo: "TogglePausa() vuelto async Task<IActionResult>; inserta AuditLog manual (Action=Update, EntityName=OutboundScheduler, NewValues=JSON de IsStandby, UserId/UserName/IpAddress desde el request) y llama _db.SaveChangesAsync() antes del redirect. Fix aditivo, el toggle en si no cambio."
      build: "dotnet build OlvidataCRM.slnx -> Compilacion correcta, 0 Errores (mismos 9 warnings preexistentes, ninguno nuevo)."
      verificacion: "Verificable por codigo y por prueba manual UI (pausar/reanudar + revisar Audit/Index como SuperUsuario), no requiere credenciales externas. Prueba manual UI queda como hand-off a QA."

