    causa_raiz: "ContactosController.GetData e IndustriasController.GetData no fueron migrados con el mismo soporte de ordenamiento dinamico que ya existe en AuditController.GetData (patron ya validado en la base del estudio); ambos hardcodean un unico OrderBy fijo."
