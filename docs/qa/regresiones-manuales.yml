    reproducido_en: "crm-olvidata - main, revision estatica de codigo (BotFlowService.cs, grep de INotificationService en toda la solucion), NO bloqueado por falta de credenciales de WhatsApp: la creacion de una Notification in-app es un INSERT en base de datos, no requiere ninguna API externa, por lo que es 100% verificable por codigo sin credenciales reales"
    pasos:
      - "Leer OlvidataCRM.Infrastructure/Services/BotFlowService.cs completo: el constructor solo recibe AppDbContext, IWhatsAppClient, IOptions<BotSettings> y ILogger — no INotificationService."
