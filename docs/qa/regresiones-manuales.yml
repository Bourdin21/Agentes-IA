    capa: Web
    archivos_fix:
      - path: ShowroomGriffin.Web/Views/Devoluciones/Crear.cshtml
        motivo: "Select2 alineado a Ventas/Crear; validacion cliente y habilitacion condicional."
    migracion_ef: null
    deteccion_qa:
      tipo: ui
      selector_o_endpoint: "Select2 #selNuevaVariante en /Devoluciones/Crear"
      condicion_falla: "Resultados sin texto al tipear letra."
    criterio_aceptacion:
      - "Cambio Mismo Valor: combo nueva variante funcional, diferencia bloqueada."
      - "Cambio Mayor Valor: combo + diferencia + medio habilitados."
