  # ── Entradas específicas del proyecto KOI ─────────────────────────────────

  - id: KOI-001
    modulo: Configuracion / Parametros / Rubros / Subgrupos / Camaras
    titulo: "Botones eliminar (btn-swal-confirm fuera del form) no ejecutan el delete"
    severidad: critical
    reproducido_en: main
    pasos:
      - "Ir a Configuracion -> Rubros (o Subgrupos, Parametros, Camaras/Index)."
      - "Hacer clic en el icono de eliminar de cualquier fila."
      - "Confirmar en el dialogo SweetAlert2."
    sintoma: "No ocurre nada. El form DELETE no se envía."
    expectativa: "Al confirmar el SweetAlert2 se ejecuta el submit del form de eliminacion asociado."
    causa_raiz: "site.js usa btn.closest('form') que retorna null cuando el boton esta FUERA del <form> referenciado por data-form / data-form-id / data-action."
    capa: Web
    archivos_fix:
      - path: KoiDumplings.Web/wwwroot/js/site.js
        motivo: "Extender handler swal-confirm: resolver data-form-id, data-form y data-action como fallback a closest('form')."
    migracion_ef: null
    deteccion_qa:
      tipo: ui
      selector_o_endpoint: ".btn-swal-confirm con data-form o data-form-id en /Configuracion/Rubros"
      condicion_falla: "Confirmar SweetAlert2 no dispara ningún submit ni navegacion."
    criterio_aceptacion:
      - "Eliminar Rubro muestra SweetAlert2; al confirmar ejecuta el DELETE y redirige con mensaje."
      - "Idem Subgrupos, Parametros y Camaras."
    pruebas_minimas:
      - "Eliminar un rubro desde Configuracion -> Rubros."
      - "Eliminar una camara desde Camaras -> Index (Admin)."

