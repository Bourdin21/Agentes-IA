  - id: KOI-004
    modulo: P-08 Cierre de periodo / PreviewCierre
    titulo: "Consumos del inversor pueden superar el bruto sin validacion bloqueante"
    severidad: major
    reproducido_en: main
    pasos:
      - "Como Admin ir a Estado de Resultados -> Cerrar periodo."
      - "En la pantalla de preview ingresar consumos mayores al bruto de cualquier inversor."
      - "Confirmar cierre."
    sintoma: "El sistema permite neto negativo. No hay error en UI ni en backend."
    expectativa: "Validacion bloqueante: 'Los consumos de [inversor] superan su liquidacion bruta'."
    causa_raiz: "Input consumo sin max; JS recalcula neto sin bloquear submit; CerrarPeriodoAsync no valida consumos <= bruto."
    capa: Web + Infrastructure
    archivos_fix:
      - path: KoiDumplings.Web/Views/EstadoResultados/PreviewCierre.cshtml
        motivo: "Validacion JS en submit: si algun neto < 0 -> Swal.fire error y preventDefault."
      - path: KoiDumplings.Infrastructure/Services/EstadoResultadosService.cs
        motivo: "En CerrarPeriodoAsync: validar consumos <= bruto por inversor antes de persistir."
    migracion_ef: null
    deteccion_qa:
      tipo: ui
      selector_o_endpoint: "input.consumo-input en /EstadoResultados/PreviewCierre"
      condicion_falla: "Submit con consumo > bruto no muestra error y genera liquidacion con neto negativo."
    criterio_aceptacion:
      - "Consumo > bruto: UI muestra Swal error bloqueante y no envia el form."
      - "Si se manipula la request: backend rechaza con ServiceResult.Error."
    pruebas_minimas:
      - "Ingresar consumo = bruto + 0.01 -> debe mostrar error y bloquear submit."
      - "Ingresar consumo = bruto -> debe permitir el cierre."


